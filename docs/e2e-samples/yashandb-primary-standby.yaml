apiVersion: middleware.cn/v1
kind: Middleware
metadata:
  name: my-yashandb-ps
  namespace: e2e-test
  labels:
    middleware.cn/component: YashanDB
    middleware.cn/packagename: yashandb-0.1.0-1.0.0
spec:
  baseline: yashandb-primary-standby
  necessary:
    repository: "harbor.middleware.com/middleware"
    version: "23.4.1.109"
    sysPassword: "YashanDB_12345"
    # Replace these placeholders with a real key pair before creating a primary-standby instance.
    sshPrivateKey: "REPLACE_WITH_SSH_PRIVATE_KEY"
    sshPublicKey: "REPLACE_WITH_SSH_PUBLIC_KEY"
    resource:
      yashandb:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "2000m"
          memory: "4Gi"
        volume:
          size: "1Gi"
          storageClass: "standard"
