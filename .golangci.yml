version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - unused
    - ineffassign
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    misspell:
      locale: US
  exclusions:
    paths:
      - vendor

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - vendor

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
